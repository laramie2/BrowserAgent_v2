worker_processes auto;

events {
    worker_connections 4096;
}

http {
    upstream kiwix_backend {
        least_conn;
        server 127.0.0.1:22115 max_fails=3 fail_timeout=10s;
        server 127.0.0.1:22116 max_fails=3 fail_timeout=10s;
        server 127.0.0.1:22117 max_fails=3 fail_timeout=10s;
        server 127.0.0.1:22118 max_fails=3 fail_timeout=10s;
        keepalive 64;
    }

    server {
        listen 22015;
        server_name localhost;

        location / {
            proxy_pass http://kiwix_backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection "";

            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
        }
    }
}
