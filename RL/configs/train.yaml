common:
  env:
    SFT_MODEL_NAME_OVERRIDE: task-opsrc_12619-sft-5e-5lr-freeze_false-2epoch
    BENCHMARK_OVERRIDE: train_hotpot500_nq500
    VAL_DATASET_NAME_OVERRIDE: test_20
    MASTER_PORT_OVERRIDE: 29501
    CUDA_VISIBLE_DEVICES: 0,1,2,3,4,5,6,7
    N_GPUS_PER_NODE_OVERRIDE: 8
    GPU_MEMORY_UTILIZATION_OVERRIDE: 0.5
    # 实验名/日志名后缀，用于区分是否启用新定义的奖励；设为 "" 表示不添加后缀。
    RUN_NAME_POSTFIX: -new-reward

train:
  env:
    ROLLOUT_N_OVERRIDE: 8
    TRAIN_BATCH_SIZE_OVERRIDE: 64
    TEMPERATURE_OVERRIDE: 0.5
    TOP_P_OVERRIDE: 1.0
    LR_OVERRIDE: 5e-7
    LR_WARMUP_STEPS_OVERRIDE: 10
    EPOCH_OVERRIDE: 8
    MAX_TURNS_OVERRIDE: 8
    LOG_PROB_MBS_OVERRIDE: 4

    # 分层采样相关参数
    ENABLE_STRATIFIED_SAMPLER_OVERRIDE: "False"
    STRATIFIED_SOURCE_LABELS_OVERRIDE: "[hotpot,nq]"
    STRATIFIED_SOURCE_RATIOS_OVERRIDE: "[1,1]"

    # 难度桶采样相关参数
    ENABLE_DIFFICULTY_BUCKET_SAMPLER_OVERRIDE: "False"
    DIFFICULTY_BUCKET_FILE_OVERRIDE: ""  # 难度文件路径
    DIFFICULTY_BUCKET_LABELS_OVERRIDE: "[bucket_0,bucket_1,bucket_2,bucket_3,bucket_4]"
    DIFFICULTY_BUCKET_RATIOS_OVERRIDE: "[24,16,12,8,4]"

    # 自定义奖励函数相关参数
    REWARD_ENABLE_OVERRIDE: "True"
    REWARD_ANSWER_WEIGHT_OVERRIDE: 0.9
    REWARD_FORMAT_WEIGHT_OVERRIDE: 0.1
    REWARD_ENABLE_PROCESS_OVERRIDE: "True"
    REWARD_ACTION_CORRECTNESS_WEIGHT_OVERRIDE: 0.1
    REWARD_HALLUCINATED_ID_PENALTY_WEIGHT_OVERRIDE: 0.0
    REWARD_TOOL_INVALID_PENALTY_WEIGHT_OVERRIDE: 0.0

    # 并发相关参数
    AGENT_LOOP_NUM_WORKERS: 4
    MAX_CONCURRENT_TRAJECTORIES: 64
    TOOL_SERVER_MAX_CONCURRENT_REQUESTS: 64
    TEXT_BROWSER_MAX_ACTIVE_ACTORS_OVERRIDE: 64
    TEXT_BROWSER_IDLE_POOL_SIZE_OVERRIDE: 4
    TEXT_BROWSER_ACTOR_CPUS_OVERRIDE: 1
    PASS_EXTRA_FIELDS_TO_REWARD: "True"
    REWARD_FN_ASYNC: "False"
    COMPACT_TOOL_INTERACT_INFO: "True"
    ROLLOUT_MAX_NUM_SEQS_OVERRIDE: 64
    ROLLOUT_MAX_BATCHED_TOKENS_OVERRIDE: 16384

presets:
  mt_grpo:
    env:
      RUN_TAG: run1
      ARTIFACT_SUFFIX: mt_grpo
      RL_ALG_OVERRIDE: mt_grpo
      PPO_MINI_BATCH_SIZE_OVERRIDE: 4
      USE_KL_LOSS_OVERRIDE: "True"
      KL_LOSS_COEF_OVERRIDE: 0.005
      KL_COEF_OVERRIDE: 0
      ENTROPY_COEFF_OVERRIDE: 0
      ENABLE_DAPO_FILTER_GROUPS_OVERRIDE: "False"
      DAPO_FILTER_GROUPS_METRIC_OVERRIDE: seq_final_reward
      DAPO_MAX_NUM_GEN_BATCHES_OVERRIDE: 0
      NORM_ADV_BY_STD_IN_GRPO_OVERRIDE: "True"
      MASK_OVERLONG_LOSS_OVERRIDE: "True"
      CLIP_RATIO_LOW_OVERRIDE: 0.2
      CLIP_RATIO_HIGH_OVERRIDE: 0.3
      CLIP_RATIO_C_OVERRIDE: 10.0
      LOSS_AGG_MODE_OVERRIDE: token-mean
      GPU_MEMORY_UTILIZATION_OVERRIDE: 0.3
      ALGO_RUN_NAME_POSTFIX: ""

  dapo:
    env:
      RUN_TAG: run1-dapo
      ARTIFACT_SUFFIX: dapo
      DAPO_ARTIFACT_SUFFIX: dapo
      RL_ALG_OVERRIDE: grpo
      PPO_MINI_BATCH_SIZE_OVERRIDE: 64
      USE_KL_LOSS_OVERRIDE: "False"
      KL_LOSS_COEF_OVERRIDE: 0
      KL_COEF_OVERRIDE: 0
      ENTROPY_COEFF_OVERRIDE: 0
      ENABLE_DAPO_FILTER_GROUPS_OVERRIDE: "True"
      DAPO_FILTER_GROUPS_METRIC_OVERRIDE: seq_final_reward
      DAPO_MAX_NUM_GEN_BATCHES_OVERRIDE: 0
      NORM_ADV_BY_STD_IN_GRPO_OVERRIDE: "True"
      MASK_OVERLONG_LOSS_OVERRIDE: "True"
      CLIP_RATIO_LOW_OVERRIDE: 0.2
      CLIP_RATIO_HIGH_OVERRIDE: 0.3
      CLIP_RATIO_C_OVERRIDE: 10.0
      LOSS_AGG_MODE_OVERRIDE: token-mean
      GPU_MEMORY_UTILIZATION_OVERRIDE: 0.5
      ALGO_RUN_NAME_POSTFIX: -dapo

auto:
  env:
    TRAIN_ALGO: dapo
    CONTINUE_ON_FAIL: 1
    SLEEP_BETWEEN_RUNS: 20
    BASE_RAY_PORT: 6380
    FORCE_RERUN: 0
    SKIP_FAILED: 0

    # 早停相关参数
    ENABLE_EARLY_STOP: 0
    METRIC_KEY: critic/rewards/mean
    EARLY_STOP_REWARD_WINDOW: 8
    EARLY_STOP_MIN_DELTA: 0.01
    EARLY_STOP_PATIENCE_WINDOWS: 5
    EARLY_STOP_PPO_KL_KEY: actor/ppo_kl
    EARLY_STOP_PPO_KL_MAX: 0.001
    EARLY_STOP_PG_CLIPFRAC_KEY: actor/pg_clipfrac
    EARLY_STOP_PG_CLIPFRAC_MAX: 0.01
    EARLY_STOP_CHECK_INTERVAL: 120

  grid:
    N_LIST: [6]
    BATCH_LIST: [64]
    LR_LIST: [1e-7, 3e-7, 5e-7]
    TEMP_LIST: [0.7, 1.0]
    EPOCH_LIST: [4]
    KL_LOSS_COEF_LIST: [0.005, 0.001]
    LR_WARMUP_STEPS_LIST: [10]
    MAX_TURNS_LIST: []
    # 实验列表（非网格搜索）
    EXPERIMENT_CONFIG_LIST: [n6_b64_lr4e-7_t0.8_kl0.00001_warmup10_turns15, n6_b64_lr5e-7_t0.8_kl0.00001_warmup10_turns15, n6_b64_lr6e-7_t0.8_kl0.00001_warmup10_turns15]
